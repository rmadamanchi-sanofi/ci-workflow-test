name: 'Generate SiteWise Terraform'
run-name: 'Generate SiteWise TF — ${{ github.ref_name }}'

on:
  push:
    branches: [ignition]
    paths:
      - "models/**"
      - "assets/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    name: 'Generate Terraform and merge to develop'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ignition branch
        uses: actions/checkout@v4
        with:
          ref: ignition
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect change type and site
        id: detect
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          TYPE=""
          SITE=""

          if echo "$CHANGED_FILES" | grep -q '^models/'; then
            TYPE="models"
            SITE="global"
          elif echo "$CHANGED_FILES" | grep -q '^assets/'; then
            TYPE="assets"
            SITE=$(echo "$CHANGED_FILES" | grep '^assets/' | head -1 | cut -d'/' -f2)
          fi

          echo "type=$TYPE" >> "$GITHUB_OUTPUT"
          echo "site=$SITE" >> "$GITHUB_OUTPUT"
          echo "Detected type: $TYPE, site: $SITE"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run generator script
        run: |
          TYPE="${{ steps.detect.outputs.type }}"
          SITE="${{ steps.detect.outputs.site }}"

          if [ "$TYPE" = "models" ]; then
            INPUT_FILE=$(find "models" -name '*.json' | head -1)
            OUTPUT_DIR="projects/sitewise/models"
          else
            INPUT_FILE=$(find "assets/$SITE" -name '*.json' | head -1)
            OUTPUT_DIR="projects/sitewise/$SITE"
          fi

          if [ -z "$INPUT_FILE" ]; then
            echo "::error::No JSON file found for $TYPE/$SITE"
            exit 1
          fi

          mkdir -p "$OUTPUT_DIR"
          echo "Generating Terraform from $INPUT_FILE → $OUTPUT_DIR"
          python uns/generator/generate_sitewise_tf.py \
            --input "$INPUT_FILE" \
            --output "$OUTPUT_DIR/${TYPE}.tf" \
            --site "$SITE"

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add projects/sitewise/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-generate Terraform for ${{ steps.detect.outputs.site }}"
            git push
          fi

      - name: Merge to develop (auto — no PR)
        run: |
          git fetch origin develop
          git checkout develop
          git merge origin/ignition --no-edit -m "chore: auto-merge ignition → develop"
          git push origin develop
