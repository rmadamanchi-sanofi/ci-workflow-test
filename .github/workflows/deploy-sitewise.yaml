name: 'Deploy SiteWise'
run-name: 'Deploy SiteWise — ${{ github.ref_name }}'

on:
  push:
    branches:
      - "release/**"
      - main
    paths:
      - "projects/sitewise/**"

concurrency:
  group: deploy-sitewise-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    name: 'Terraform Deploy'
    runs-on: ubuntu-latest
    environment: ${{ (
        startsWith(github.ref_name, 'release/') && 'test'
      ) || (
        (github.ref_name == 'main') && 'prod'
      ) || 'dev' }}

    outputs:
      site: ${{ steps.site.outputs.site }}
      env: ${{ steps.env.outputs.env }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine environment
        id: env
        run: |
          set -euo pipefail

          BRANCH="${{ github.ref_name }}"
          if [[ "$BRANCH" == release/* ]]; then
            ENV="test"
          elif [ "$BRANCH" = "main" ]; then
            ENV="prod"
          else
            echo "::error::Unknown branch for deployment: $BRANCH"
            exit 1
          fi
          echo "env=$ENV" >> "$GITHUB_OUTPUT"
          echo "Deploying to: $ENV (branch: $BRANCH)"

      - name: Detect site from changes
        id: site
        run: |
          set -euo pipefail

          # For release branches, extract site from branch name: release/{site}/v{x}
          BRANCH="${{ github.ref_name }}"
          if [[ "$BRANCH" == release/* ]]; then
            SITE=$(echo "$BRANCH" | cut -d'/' -f2)
          else
            # For main, detect from changed files
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git show --name-only --pretty="" HEAD)
            SITE=$(echo "$CHANGED_FILES" | grep '^projects/sitewise/' | head -1 | cut -d'/' -f3)
          fi

          if [ -z "$SITE" ]; then
            echo "::warning::Could not detect site, defaulting to 'global'"
            SITE="global"
          fi
          echo "site=$SITE" >> "$GITHUB_OUTPUT"
          echo "Detected site: $SITE"

      - name: Verify Terraform files exist
        run: |
          set -euo pipefail

          SITE="${{ steps.site.outputs.site }}"
          TF_DIR="projects/sitewise/$SITE"

          if [ ! -d "$TF_DIR" ]; then
            echo "::error::Terraform directory not found: $TF_DIR"
            exit 1
          fi

          TF_FILES=$(find "$TF_DIR" -name '*.tf' -type f | wc -l)
          if [ "$TF_FILES" -eq 0 ]; then
            echo "::error::No .tf files found in $TF_DIR"
            exit 1
          fi

          echo "✅ Found $TF_FILES Terraform file(s) in $TF_DIR"

      - name: Terraform Init (simulated)
        run: |
          set -euo pipefail

          SITE="${{ steps.site.outputs.site }}"
          ENV="${{ steps.env.outputs.env }}"
          echo "============================================"
          echo "  terraform init"
          echo "  -backend-config=env/$ENV/backend.hcl"
          echo "  -chdir=projects/sitewise/$SITE"
          echo "============================================"
          echo "Terraform has been successfully initialized!"

      - name: Terraform Plan
        id: plan
        run: |
          set -euo pipefail

          SITE="${{ steps.site.outputs.site }}"
          ENV="${{ steps.env.outputs.env }}"
          echo "============================================"
          echo "  terraform plan -out=tfplan"
          echo "  -var-file=env/$ENV/env_common.tfvars"
          echo "  -chdir=projects/sitewise/$SITE"
          echo "============================================"
          echo ""
          echo "Plan: 3 to add, 0 to change, 0 to destroy."

          # Post plan to step summary for reviewer visibility
          echo "## Terraform Plan — $SITE ($ENV)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "Plan: 3 to add, 0 to change, 0 to destroy." >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Terraform Apply (simulated)
        run: |
          set -euo pipefail

          SITE="${{ steps.site.outputs.site }}"
          ENV="${{ steps.env.outputs.env }}"
          echo "============================================"
          echo "  DEPLOYING SiteWise"
          echo "  Site: $SITE"
          echo "  Environment: $ENV"
          echo "  Branch: ${{ github.ref_name }}"
          echo "============================================"
          echo ""
          echo "  terraform apply -auto-approve tfplan"
          echo ""
          echo "Apply complete! Resources: 3 added, 0 changed, 0 destroyed."

      - name: Post deployment summary
        if: always()
        run: |
          SITE="${{ steps.site.outputs.site }}"
          ENV="${{ steps.env.outputs.env }}"

          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Site | $SITE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | $ENV |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | ${{ github.ref_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | ${{ job.status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"

  post-plan-to-pr:
    name: 'Post Plan to PR'
    needs: [deploy]
    if: startsWith(github.ref_name, 'release/')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Find associated PR
        id: find-pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          PR_NUMBER=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${{ github.ref_name }}" \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No open PR found for branch ${{ github.ref_name }}"
            echo "pr_found=false" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "pr_found=true" >> "$GITHUB_OUTPUT"
            echo "Found PR #$PR_NUMBER"
          fi

      - name: Post Terraform plan as PR comment
        if: steps.find-pr.outputs.pr_found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          SITE="${{ needs.deploy.outputs.site }}"
          ENV="${{ needs.deploy.outputs.env }}"
          PR_NUMBER="${{ steps.find-pr.outputs.pr_number }}"

          gh pr comment "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "## Terraform Plan — $SITE ($ENV)

          \`\`\`
          Plan: 3 to add, 0 to change, 0 to destroy.
          \`\`\`

          **Status:** ✅ Deployed to $ENV successfully
          **Commit:** \`${{ github.sha }}\`

          ---
          _Merge this PR to deploy to the next environment._"

          echo "✅ Posted plan to PR #$PR_NUMBER"
