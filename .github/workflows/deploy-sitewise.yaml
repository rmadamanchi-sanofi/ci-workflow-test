name: 'Deploy SiteWise'
run-name: 'Deploy SiteWise — ${{ github.ref_name }}'

on:
  push:
    branches:
      - develop
      - main
      - "release/**"

concurrency:
  group: deploy-sitewise-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    name: 'Terraform Deploy'
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.env.outputs.env }}
      site: ${{ steps.site.outputs.site }}
    environment: ${{ (
        (github.ref_name == 'develop') && 'dev'
      ) || (
        startsWith(github.ref_name, 'release/') && 'test'
      ) || (
        (github.ref_name == 'main') && 'prod'
      ) || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine environment
        id: env
        run: |
          set -euo pipefail

          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "develop" ]; then
            ENV="dev"
          elif [[ "$BRANCH" == release/* ]]; then
            ENV="test"
          elif [ "$BRANCH" = "main" ]; then
            ENV="prod"
          else
            echo "::error::Unknown branch for deployment: $BRANCH"
            exit 1
          fi
          echo "env=$ENV" >> "$GITHUB_OUTPUT"
          echo "Deploying to: $ENV (branch: $BRANCH)"

      - name: Detect site from changes
        id: site
        run: |
          set -euo pipefail

          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git show --name-only --pretty="" HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          SITE=$(echo "$CHANGED_FILES" | grep '^projects/sitewise/' | head -1 | cut -d'/' -f3)
          if [ -z "$SITE" ]; then
            echo "::warning::Could not detect site from changes, defaulting to 'global'"
            SITE="global"
          fi
          echo "site=$SITE" >> "$GITHUB_OUTPUT"
          echo "Detected site: $SITE"

      - name: Verify Terraform files exist
        run: |
          set -euo pipefail

          SITE="${{ steps.site.outputs.site }}"
          TF_DIR="projects/sitewise/$SITE"

          if [ ! -d "$TF_DIR" ]; then
            echo "::error::Terraform directory not found: $TF_DIR"
            exit 1
          fi

          TF_FILES=$(find "$TF_DIR" -name '*.tf' -type f | wc -l)
          if [ "$TF_FILES" -eq 0 ]; then
            echo "::error::No .tf files found in $TF_DIR"
            exit 1
          fi

          echo "✅ Found $TF_FILES Terraform file(s) in $TF_DIR"

      - name: Terraform Init (simulated)
        run: |
          set -euo pipefail

          SITE="${{ steps.site.outputs.site }}"
          ENV="${{ steps.env.outputs.env }}"
          echo "============================================"
          echo "  terraform init"
          echo "  -backend-config=env/$ENV/backend.hcl"
          echo "  -chdir=projects/sitewise/$SITE"
          echo "============================================"
          echo "Terraform has been successfully initialized!"

      - name: Terraform Plan (simulated)
        id: plan
        run: |
          set -euo pipefail

          SITE="${{ steps.site.outputs.site }}"
          ENV="${{ steps.env.outputs.env }}"
          echo "============================================"
          echo "  terraform plan -out=tfplan"
          echo "  -var-file=env/$ENV/env_common.tfvars"
          echo "  -chdir=projects/sitewise/$SITE"
          echo "============================================"
          echo ""
          echo "Plan: 3 to add, 0 to change, 0 to destroy."

          # Post plan to step summary so reviewers can see it before approving
          echo "## Terraform Plan — $SITE ($ENV)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "Plan: 3 to add, 0 to change, 0 to destroy." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "  + awscc_iotsitewise_asset_model.trayhandleredgetoplatform" >> "$GITHUB_STEP_SUMMARY"
          echo "  + awscc_iotsitewise_asset_model.trayhandleredgetoplatform (properties)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          # In production:
          # terraform plan -detailed-exitcode -out=tfplan \
          #   -var-file=../../env/$ENV/env_common.tfvars \
          #   -chdir=projects/sitewise/$SITE | tee plan_output.txt
          # cat plan_output.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Terraform Apply (simulated)
        run: |
          set -euo pipefail

          SITE="${{ steps.site.outputs.site }}"
          ENV="${{ steps.env.outputs.env }}"
          echo "============================================"
          echo "  DEPLOYING SiteWise"
          echo "  Site: $SITE"
          echo "  Environment: $ENV"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Commit: ${{ github.sha }}"
          echo "============================================"
          echo ""
          echo "  terraform apply -auto-approve tfplan"
          echo ""
          echo "Apply complete! Resources: 3 added, 0 changed, 0 destroyed."

          # In production:
          # terraform apply -auto-approve tfplan -chdir=projects/sitewise/$SITE
          # If apply fails here, the job fails — promote jobs won't run

      - name: Post deployment summary
        if: always()
        run: |
          SITE="${{ steps.site.outputs.site }}"
          ENV="${{ steps.env.outputs.env }}"

          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Site | $SITE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | $ENV |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | ${{ github.ref_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | ${{ job.status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"

  promote-to-test:
    name: 'Promote to Test'
    needs: [deploy]
    runs-on: ubuntu-latest
    if: github.ref_name == 'develop' && needs.deploy.result == 'success'

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Create release branch
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          SITE="${{ needs.deploy.outputs.site }}"
          RELEASE_BRANCH="release/${SITE}/v${{ github.run_number }}"

          git checkout -b "$RELEASE_BRANCH"

          if ! git push origin "$RELEASE_BRANCH"; then
            echo "::error::Failed to create release branch: $RELEASE_BRANCH"
            exit 1
          fi

          echo "✅ Created release branch: $RELEASE_BRANCH"
          echo "   Deploy workflow will trigger for Test environment"

  promote-to-prod:
    name: 'Promote to Prod'
    needs: [deploy]
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'release/') && needs.deploy.result == 'success'

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Push to main
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if ! git push origin ${{ github.ref_name }}:main; then
            echo "::error::Failed to push to main. Main may have diverged — manual intervention required."
            exit 1
          fi

          echo "✅ Pushed to main — Deploy workflow will trigger for Prod environment"
